<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Traveller.tn</title>
    <link rel="icon" type="icon" href="image/20260519_105926.png">

<body>
    <header>
        <div class="container">
            <img src="image/Airbus_A319_Corporate-removebg-preview.png" alt="">
            <h1>Cloud Traveller</h1>
            <nav class="nav">
                <a href="newregistration.html">sign in</a>
                <a href="aero.html" id="logout">logout</a>
            </nav>
        </div>
    </header>
    <br>
    <section>
        <form action="" id="flight search" class="">
            <select name="" id="From">
                <option value="">--ENTER ORIGIN--</option>
                <option value="Chennai(MAA)">Chennai(MAA)</option>
                <option value="Madurai(IXM)">Madurai(IXM)</option>
                <option value="Tiruchirapalli(TRZ)">Tiruchirapalli(TRZ)</option>
                <option value="Coimbatore(CJB)">Coimbatore(CJB)</option>
                <option value="Pondicherry(PNY)">Pondicherry(PNY)</option>
                <option value="Tuticorin(TCR)">Tuticorin(TCR)</option>
            </select>

            <label for="TO"></label>
            <select name="" id="TO">
                <option value="">--SELECT DESTINATION--</option>
                <option value="Chennai(MAA)">Chennai(MAA)</option>
                <option value="Madurai(IXM)">Madurai(IXM)</option>
                <option value="Tiruchirapalli(TRZ)">Tiruchirapalli(TRZ)</option>
                <option value="Coimbatore(CJB)">Coimbatore(CJB)</option>
                <option value="Pondicherry(PNY)">Pondicherry(PNY)</option>
                <option value="Tuticorin(TCR)">Tuticorin(TCR)</option>
            </select>


            <input type="date" id="Date" class="date" min="2026-06-04" max="2026-07-10">

            <select name="" id="Select">
                <option value="">--SELECT CLASS--</option>
                <option value="Economy">Economy</option>
                <option value="Premium Economy">Premium Economy</option>
                <option value="Business">Business</option>
            </select>
            </div>
            <br>
            <div class="special">
                <label for="">Special fare(optional)</label>
                <br>
                <input type="radio" name="radio" id="Student">
                <label for="Student">Student</label>
                <input type="radio" name="radio" id="Senior Citizen">
                <label for="Senior Citizen">Senior Citizen</label>
                <input type="radio" name="radio" id="Armed Force">
                <label for="Armed Force">Armed Force</label>
                <div>

                    <br>
                    <button id="btn" type="submit" class="button">Search Flight</button>
        </form>
    </section>
    <section id="results-section" class="flight-results-container" style="display: none;">
        <h2>Available Flights</h2>
        <div id="flights-list"></div>
    </section>

   

</body>
